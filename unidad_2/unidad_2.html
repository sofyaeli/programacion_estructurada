<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electrónica - Mis Deberes</title>
    <link rel="icon" type="image/x-icon" href="helmet_2823525.png" />

    <style>
      /* Configuración General */
      body {
        background-color: #1e1e26;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        color: #e0e0e0;
      }

      .main-container {
        background-color: #2a2a35;
        padding: 40px;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
        text-align: center;
        box-shadow:
          10px 10px 20px #15151a,
          -5px -5px 15px #3f3f4f;
        border: 1px solid #333;
      }

      /* --- NAVEGACIÓN SUPERIOR (Estilo sobrio) --- */
      .nav-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
      }

      .btn-nav-header {
        text-decoration: none;
        color: #a0a0a0;
        background: #2a2a35;
        padding: 8px 15px;
        border-radius: 8px;
        font-size: 0.85rem;
        border: 1px solid #444;
        transition: all 0.3s ease;
        box-shadow:
          3px 3px 6px #15151a,
          -2px -2px 5px #3f3f4f;
      }

      .btn-nav-header:hover {
        color: #00d4ff;
        border-color: #00d4ff;
        background-color: #2e2e3a; /* Cambio ligero de fondo */
        transform: translateY(-2px);
      }

      /* --- BOTONES DE DEBERES (Estilo llamativo con degradado) --- */
      .links-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 20px;
      }

      .btn-deber {
        text-decoration: none;
        color: #ffffff;
        background: linear-gradient(145deg, #00b4d8, #0077b6);
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 4px 4px 8px #1a1a21;
      }

      .btn-deber:hover {
        transform: translateY(-3px);
        box-shadow: 0px 8px 15px rgba(0, 212, 255, 0.3);
        background: linear-gradient(145deg, #00d4ff, #0096c7);
      }

      /* Estilos de texto */
      h1 {
        color: #00d4ff;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }
      h2 {
        font-size: 1.2rem;
        color: #a0a0a0;
        margin-top: 30px;
      }
      p {
        line-height: 1.6;
        color: #b0b0b0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <nav class="nav-buttons">
        <a href="../index.html" class="btn-nav-header">🏠 Home</a>

        Bienvenido a mis deberes de la unidad 2, aqui encontrarás las
        actividades asignadas en la Unidad 2.

          >📟 Trabajo Autónomo No. 03</a
        >
        <a href="ejercicio_4.html" class="btn-deber"
          >📟 Trabajo Autónomo No. 04</a
        >
        <a href="clase_practica_2.html" class="btn-deber"
          >📟 Clase Práctica No. 2</a
        >
      </div>
    </div>
  </body>
</html>
