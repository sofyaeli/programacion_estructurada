<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electrónica - Mis Deberes</title>
    <link rel="icon" type="image/x-icon" href="helmet_2823525.png" />

    <style>
      /* Configuración General */
      body {
        background-color: #1e1e26; /* Gris muy oscuro industrial */
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        color: #e0e0e0;
      }

      /* Contenedor Principal con Relieve */
      .main-container {
        background-color: #2a2a35;
        padding: 40px;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
        text-align: center;
        /* Efecto de relieve (Neumorfismo) */
        box-shadow:
          10px 10px 20px #15151a,
          -5px -5px 15px #3f3f4f;
        border: 1px solid #333;
      }

      h1 {
        color: #00d4ff; /* Azul eléctrico */
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }

      h2 {
        font-size: 1.2rem;
        color: #a0a0a0;
        margin-top: 30px;
      }

      p {
        line-height: 1.6;
        color: #b0b0b0;
        font-size: 0.95rem;
      }

      /* Contenedor de Enlaces */
      .links-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 20px;
      }

      /* Botones / Enlaces */
      a {
        text-decoration: none;
        color: #ffffff;
        background: linear-gradient(145deg, #00b4d8, #0077b6);
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 4px 4px 8px #1a1a21;
      }

      a:hover {
        transform: translateY(-3px);
        box-shadow: 0px 8px 15px rgba(0, 212, 255, 0.3);
        background: linear-gradient(145deg, #00d4ff, #0096c7);
      }

      a:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <h1>Programación Estructurada</h1>
      <p>Bienvenido aqui encontraras mis Deberes.</p>

      <hr style="border: 0; border-top: 1px solid #444; margin: 25px 0" />

      <h2>Enlace a mis Deberes</h2>

      <div class="links-container">
        <a href="unidad_1/deberes.html">📝 Unidad 1</a>
        <a href="unidad_2/unidad_2.html">📝 Unidad 2</a>
        <a href="unidad_3/unidad_3.html">📝 Unidad 3</a>
      </div>
      <p
        style="
          text-align: center;
          margin-top: 20px;
          font-size: 0.8rem;
          opacity: 0.5;
        "
      >
        By <span style="color: #2ec4b6">Sofía Terán</span>
      </p>
    </div>
  </body>
</html>
